<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Kuis Gambar | Fullscreen Visual Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0f1c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Roboto', sans-serif;
            padding: 0;
            margin: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .quiz-container {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #10182c 0%, #0b1120 100%);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .quiz-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px 32px 28px;
            gap: 16px;
            overflow-y: auto;
        }

        .interactive-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            align-items: center;
        }

        .image-area {
            flex: 1 1 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 32px;
            padding: 20px;
            min-height: 0;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05), 0 20px 35px -12px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        
        .quiz-image {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 24px;
            background: #0f1422;
            box-shadow: 0 20px 30px -10px black;
            display: block;
            pointer-events: none;
        }

        .display-group {
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
        }
        .answer-display {
            width: 100%;
            background: #fefcf0;
            border: 2px solid #ffdf8c;
            border-radius: 16px;
            padding: 12px;
            font-size: 1.6rem;
            font-weight: 700;
            text-align: center;
            font-family: 'SF Mono', 'Fira Code', monospace;
            color: #0f172a;
            min-height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        .numpad-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 320px;
        }
        .btn-num {
            background: #1e293b;
            color: #f1f5f9;
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 1.3rem;
            font-weight: 700;
            padding: 14px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            justify-content: center;
        }
        .btn-num:active {
            transform: scale(0.95);
            background: #334155;
        }
        .btn-delete {
            background: #7f1d1d;
            color: #fca5a5;
        }
        .btn-delete:active {
            background: #991b1b;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            width: 100%;
            max-width: 320px;
            margin-top: 24px;
        }
        .nav-buttons button {
            flex: 1;
            padding: 12px 20px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: 0.1s;
        }
        .nav-buttons button:active:not(:disabled) {
            transform: scale(0.96);
        }
        .btn-primary { background: #facc15; color: #0f172a; }
        .btn-secondary { background: #334155; color: #f8fafc; }
        .btn-warning { background: #eab308; color: #0f172a; }
        button:disabled { opacity: 0.35; cursor: not-allowed; }

        .status-msg {
            text-align: center;
            font-size: 0.75rem;
            color: #facc15;
            font-weight: 500;
            min-height: 16px;
        }

        .zoom-modal {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000000;
            display: flex; align-items: center; justify-content: center;
            z-index: 3000; visibility: hidden; opacity: 0;
            transition: all 0.25s ease; cursor: pointer;
        }
        .zoom-modal.active { visibility: visible; opacity: 1; }
        
        .zoom-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: default; 
        }
        
        .zoom-image { 
            width: 100vw; 
            height: 100vh; 
            object-fit: contain;
            animation: zoomIn 0.2s ease-out; 
        }
        
        @keyframes zoomIn { 
            from { transform: scale(0.95); opacity: 0; } 
            to { transform: scale(1); opacity: 1; } 
        }
        
        .zoom-close { 
            position: absolute; 
            top: 16px; 
            right: 16px; 
            background: rgba(0, 0, 0, 0.6); 
            backdrop-filter: blur(8px); 
            border: 1px solid rgba(255,255,255,0.25); 
            color: white; 
            width: 44px; 
            height: 44px; 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 22px; font-weight: bold; cursor: pointer; z-index: 3100; 
            transition: 0.1s;
        }
        .zoom-close:hover { background: rgba(0, 0, 0, 0.8); transform: scale(1.05); }

        .modal-score {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: center;
            z-index: 2000; visibility: hidden; opacity: 0;
            transition: 0.2s ease;
        }
        .modal-score.active { visibility: visible; opacity: 1; }
        .modal-card { background: linear-gradient(145deg, #fef9e6, #fff7e0); max-width: 380px; width: 85%; border-radius: 40px; padding: 32px 24px; text-align: center; box-shadow: 0 40px 50px rgba(0,0,0,0.5); border: 1px solid rgba(250,204,21,0.5); }
        .modal-card h2 { font-size: 2rem; margin-bottom: 16px; color: #1e293b; }
        .score-number { font-size: 4rem; font-weight: 900; background: linear-gradient(145deg, #eab308, #f97316); background-clip: text; -webkit-background-clip: text; color: transparent; margin: 12px 0; }
        .modal-card p { color: #334155; margin: 16px 0; font-weight: 500; }
        .close-modal { background: #1e293b; color: white; margin-top: 12px; padding: 14px; border-radius: 60px; width: 100%; font-weight: bold; border:none; cursor:pointer;}
        hr { margin: 18px 0; border-color: #ffdd99; }

        @media (orientation: landscape) and (max-height: 550px) {
            .quiz-content {
                flex-direction: row;
                padding: 12px 20px;
                gap: 20px;
                overflow: hidden;
            }

            .image-area {
                flex: 1.2;
                height: 100%;
                border-radius: 20px;
                padding: 8px;
            }

            .interactive-area {
                flex: 1;
                justify-content: center;
                gap: 4px;
                height: 100%;
            }

            .display-group { max-width: 280px; }
            .answer-display { font-size: 1.3rem; padding: 6px; min-height: 40px; border-radius: 10px; }
            .numpad-grid { max-width: 280px; gap: 6px; }
            .btn-num { font-size: 1.1rem; padding: 8px; border-radius: 10px; }
            .status-msg { min-height: 12px; font-size: 0.65rem; }

            .nav-buttons {
                max-width: 280px;
                margin-top: 30px;
                gap: 8px;
            }

            .nav-buttons button {
                padding: 8px;
                font-size: 0.85rem;
                border-radius: 10px;
            }
            
            .zoom-close { top: 12px; right: 12px; width: 38px; height: 38px; font-size: 18px; }
        }
    </style>
</head>
<body>

<div class="quiz-container" id="quizApp">
    <div class="quiz-content">
        <div class="image-area" id="imageArea">
            <img class="quiz-image" id="questionImage" alt="Gambar soal - klik untuk zoom" src="" loading="eager">
        </div>
        
        <div class="interactive-area">
            
            <div class="display-group">
                <div class="answer-display" id="answerDisplay">-</div>
            </div>
            
            <div id="inputStatus" class="status-msg"></div>

            <div class="numpad-grid">
                <button class="btn-num" onclick="pressNum('1')">1</button>
                <button class="btn-num" onclick="pressNum('2')">2</button>
                <button class="btn-num" onclick="pressNum('3')">3</button>
                <button class="btn-num" onclick="pressNum('4')">4</button>
                <button class="btn-num" onclick="pressNum('5')">5</button>
                <button class="btn-num" onclick="pressNum('6')">6</button>
                <button class="btn-num" onclick="pressNum('7')">7</button>
                <button class="btn-num" onclick="pressNum('8')">8</button>
                <button class="btn-num" onclick="pressNum('9')">9</button>
                <button class="btn-num" onclick="pressNum('0')">0</button>
                <button class="btn-num btn-delete" onclick="pressDelete()" style="grid-column: span 2;">⌫ Hapus</button>
            </div>

            <div class="nav-buttons">
                <button id="prevBtn" class="btn-secondary" disabled>◀ Sebelum</button>
                <button id="nextBtn" class="btn-primary">Lanjut ▶</button>
                <button id="finishBtn" class="btn-warning" style="display: none;">🏁 Selesai</button>
            </div>
        </div>
    </div>
</div>

<div id="zoomModal" class="zoom-modal">
    <div class="zoom-container">
        <div class="zoom-close" id="zoomCloseBtn">✕</div>
        <img id="zoomImage" class="zoom-image" alt="Gambar diperbesar">
    </div>
</div>

<div id="scoreModal" class="modal-score">
    <div class="modal-card">
        <h2>✨ Hasil Akhir ✨</h2>
        <div class="score-number" id="finalScoreSpan">0</div>
        <p id="gradeMessage"></p>
        <hr>
        <button class="close-modal" id="closeModalBtn">🔄 Ulangi Test</button>
    </div>
</div>

<script>
    const questions = [
        { image: "image/1.jpg", answer: "12" },
        { image: "image/2.jpg", answer: "8" },
        { image: "image/3.jpg", answer: "29" },
        { image: "image/4.jpg", answer: "5" },
        { image: "image/5.jpg", answer: "3" },
        { image: "image/6.jpg", answer: "15" },
        { image: "image/7.jpg", answer: "74" },
        { image: "image/8.jpg", answer: "6" },
        { image: "image/9.jpg", answer: "45" },
        { image: "image/10.jpg", answer: "5" },
        { image: "image/11.jpg", answer: "7" },
        { image: "image/12.jpg", answer: "16" },
        { image: "image/13.jpg", answer: "73" },
        { image: "image/14.jpg", answer: "26" },
        { image: "image/15.jpg", answer: "42" }
    ];

    let currentIndex = 0;
    let userAnswers = new Array(questions.length).fill("");
    const totalQuestions = questions.length;

    const questionImage = document.getElementById("questionImage");
    const imageArea = document.getElementById("imageArea");
    const answerDisplay = document.getElementById("answerDisplay");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const finishBtn = document.getElementById("finishBtn");
    const inputStatus = document.getElementById("inputStatus");
    const scoreModal = document.getElementById("scoreModal");
    const finalScoreSpan = document.getElementById("finalScoreSpan");
    const gradeMessage = document.getElementById("gradeMessage");
    const closeModalBtn = document.getElementById("closeModalBtn");
    
    const zoomModal = document.getElementById("zoomModal");
    const zoomImage = document.getElementById("zoomImage");
    const zoomCloseBtn = document.getElementById("zoomCloseBtn");

    function pressNum(num) {
        let current = userAnswers[currentIndex];
        if (current.length < 4) {
            userAnswers[currentIndex] = current + num;
            renderAnswerDisplay();
            showSavedStatus();
        }
    }

    function pressDelete() {
        let current = userAnswers[currentIndex];
        if (current.length > 0) {
            userAnswers[currentIndex] = current.slice(0, -1);
            renderAnswerDisplay();
            showSavedStatus();
        }
    }

    function renderAnswerDisplay() {
        const val = userAnswers[currentIndex];
        answerDisplay.innerText = val === "" ? "-" : val;
    }

    function showSavedStatus() {
        inputStatus.innerHTML = "✓ Tersimpan";
        setTimeout(() => {
            if (inputStatus.innerHTML === "✓ Tersimpan") inputStatus.innerHTML = "";
        }, 600);
    }

    function calculateCurrentScore() {
        let correct = 0;
        for (let i = 0; i < totalQuestions; i++) {
            const userAns = userAnswers[i] ? userAnswers[i].trim() : "";
            if (userAns === "") continue;
            const correctAns = questions[i].answer.toString().trim();
            if (userAns === correctAns) {
                correct++;
            }
        }
        return correct;
    }

    function loadQuestion() {
        const q = questions[currentIndex];
        questionImage.src = q.image;
        
        renderAnswerDisplay();
        
        if (currentIndex === totalQuestions - 1) {
            nextBtn.style.display = "none";
            finishBtn.style.display = "inline-flex";
        } else {
            nextBtn.style.display = "inline-flex";
            finishBtn.style.display = "none";
        }
        
        prevBtn.disabled = (currentIndex === 0);
        inputStatus.innerHTML = "";
    }
    
    function goPrev() {
        if (currentIndex > 0) {
            currentIndex--;
            loadQuestion();
        }
    }
    
    function goNext() {
        if (currentIndex < totalQuestions - 1) {
            currentIndex++;
            loadQuestion();
        }
    }
    
    function finishQuiz() {
        const totalCorrect = calculateCurrentScore();
        const maxScore = totalQuestions;
        
        finalScoreSpan.innerText = `${totalCorrect} / ${maxScore}`;
        const percentage = (totalCorrect / maxScore) * 100;
        let message = "";
        if (percentage === 100) message = "🏆 Sempurna! Penglihatan dan ketelitian luar biasa! 🎉";
        else if (percentage >= 80) message = "🌟 Penglihatan hampir sempurna!";
        else if (percentage >= 60) message = "👍 Tingkatkan lagi ketelitianmu!";
        else message = "💪 Jangan menyerah! Ulangi lagi untuk hasil lebih baik!";
        
        gradeMessage.innerText = message;
        scoreModal.classList.add("active");
    }
    
    function resetAndRestart() {
        userAnswers = new Array(questions.length).fill("");
        currentIndex = 0;
        loadQuestion();
        scoreModal.classList.remove("active");
    }
    
    function openZoom() {
        const currentImageSrc = questionImage.src;
        if (currentImageSrc) {
            zoomImage.src = currentImageSrc;
            zoomModal.classList.add("active");
        }
    }
    
    function closeZoom() {
        zoomModal.classList.remove("active");
    }
    
    function bindEvents() {
        prevBtn.addEventListener("click", goPrev);
        nextBtn.addEventListener("click", goNext);
        finishBtn.addEventListener("click", finishQuiz);
        closeModalBtn.addEventListener("click", resetAndRestart);
        
        imageArea.addEventListener("click", openZoom);
        zoomCloseBtn.addEventListener("click", closeZoom);
        zoomModal.addEventListener("click", (e) => { if (e.target === zoomModal) closeZoom(); });
    }
    
    function init() {
        bindEvents();
        loadQuestion();
    }
    
    init();
</script>
</body>
</html>
