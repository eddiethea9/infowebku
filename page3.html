<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Kuis Gambar | Fullscreen Visual Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0f1c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Roboto', sans-serif;
            padding: 0;
            margin: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .quiz-container {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #10182c 0%, #0b1120 100%);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: none;
            border-radius: 0;
            backdrop-filter: none;
        }

        .quiz-header {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            padding: 14px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            z-index: 10;
            flex-shrink: 0;
        }
        .question-counter {
            background: rgba(255,255,240,0.2);
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.5px;
            color: #f9f3d9;
            backdrop-filter: blur(4px);
        }
        .score-badge {
            background: #facc15;
            color: #1e293b;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 800;
            font-size: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .quiz-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px 32px 28px;
            gap: 16px;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        .image-area {
            flex: 1 1 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 48px;
            padding: 20px;
            min-height: 0;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05), 0 20px 35px -12px rgba(0,0,0,0.5);
        }
        .quiz-image {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 32px;
            background: #0f1422;
            box-shadow: 0 20px 30px -10px black;
            transition: all 0.2s ease;
            display: block;
        }

        .instruction {
            text-align: center;
            color: #cbd5e6;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
            background: rgba(0,0,0,0.3);
            padding: 6px 16px;
            border-radius: 60px;
            width: fit-content;
            margin: 0 auto;
            backdrop-filter: blur(4px);
        }

        .answer-group {
            display: flex;
            justify-content: center;
            margin: 8px 0 4px;
        }
        .answer-input {
            width: 100%;
            max-width: 380px;
            background: #fefcf0;
            border: 2px solid #ffdf8c;
            border-radius: 80px;
            padding: 16px 24px;
            font-size: 1.35rem;
            font-weight: 600;
            text-align: center;
            font-family: 'SF Mono', 'Fira Code', monospace;
            letter-spacing: 1.5px;
            transition: 0.2s;
            color: #0f172a;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .answer-input:focus {
            border-color: #facc15;
            outline: none;
            box-shadow: 0 0 0 4px rgba(250,204,21,0.3);
            transform: scale(1.01);
            background: white;
        }
        .answer-input::placeholder {
            color: #8e9aaf;
            font-weight: 500;
            font-size: 1rem;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 12px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        button {
            background: #1e293b;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #f1f5f9;
            font-family: inherit;
            backdrop-filter: blur(4px);
            box-shadow: 0 5px 12px rgba(0,0,0,0.3);
        }
        button i {
            font-style: normal;
            font-weight: bold;
            font-size: 1.2rem;
        }
        button:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: #facc15;
            color: #0f172a;
            font-weight: 800;
            box-shadow: 0 8px 18px rgba(250,204,21,0.4);
        }
        .btn-primary:hover {
            background: #ffdf7e;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #334155;
            color: #f8fafc;
        }
        .btn-secondary:hover:not(:disabled) {
            background: #475569;
            transform: translateY(-2px);
        }
        .btn-warning {
            background: #eab308;
            color: #0f172a;
            font-weight: 800;
        }
        .btn-warning:hover {
            background: #facc15;
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        .status-msg {
            text-align: center;
            font-size: 0.75rem;
            color: #facc15;
            margin-top: 6px;
            font-weight: 500;
            min-height: 28px;
        }

        .modal-score {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s ease;
        }
        .modal-score.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-card {
            background: linear-gradient(145deg, #fef9e6, #fff7e0);
            max-width: 380px;
            width: 85%;
            border-radius: 64px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 40px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(250,204,21,0.5);
        }
        .modal-card h2 {
            font-size: 2rem;
            margin-bottom: 16px;
            color: #1e293b;
        }
        .score-number {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(145deg, #eab308, #f97316);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 12px 0;
        }
        .modal-card p {
            color: #334155;
            margin: 16px 0;
            font-weight: 500;
        }
        .close-modal {
            background: #1e293b;
            color: white;
            margin-top: 12px;
            padding: 14px;
            border-radius: 60px;
            width: 100%;
            font-weight: bold;
        }
        hr {
            margin: 18px 0;
            border-color: #ffdd99;
        }

        @media (max-width: 700px) {
            .quiz-content {
                padding: 16px 20px 20px;
            }
            .answer-input {
                padding: 12px 20px;
                font-size: 1.2rem;
                max-width: 300px;
            }
            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
            .image-area {
                padding: 12px;
                border-radius: 32px;
            }
        }
        @media (max-width: 550px) {
            .quiz-header {
                padding: 10px 18px;
            }
            .question-counter, .score-badge {
                padding: 5px 14px;
                font-size: 0.85rem;
            }
            .instruction {
                font-size: 0.75rem;
            }
            .quiz-image {
                max-height: 55vh;
            }
        }
        @media (orientation: landscape) and (max-height: 550px) {
            .quiz-content {
                padding: 8px 24px;
                gap: 8px;
            }
            .answer-input {
                padding: 8px 16px;
            }
            .image-area {
                padding: 8px;
            }
            button {
                padding: 8px 20px;
            }
        }
    </style>
</head>
<body>

<div class="quiz-container" id="quizApp">
    <div class="quiz-header">
        <div class="question-counter" id="counterDisplay">Soal 1 / 25</div>
        <div class="score-badge" id="liveScoreDisplay">🏆 Skor: 0</div>
    </div>
    <div class="quiz-content">
        <div class="image-area">
            <img class="quiz-image" id="questionImage" alt="Gambar soal" src="" loading="eager">
        </div>
        
        <div class="instruction">🔢 Ketik jawaban: Angka atau Huruf Kapital</div>
        
        <div class="answer-group">
            <input type="text" id="answerInput" class="answer-input" placeholder="Ketik jawaban di sini..." autocomplete="off" spellcheck="false">
        </div>
        <div id="inputStatus" class="status-msg"></div>

        <div class="nav-buttons">
            <button id="prevBtn" class="btn-secondary" disabled>◀  Sebelum</button>
            <button id="nextBtn" class="btn-primary">Selanjutnya  ▶</button>
            <button id="finishBtn" class="btn-warning" style="display: none;">🏁 Selesai & Nilai</button>
        </div>
    </div>
</div>

<div id="scoreModal" class="modal-score">
    <div class="modal-card">
        <h2>✨ Hasil Akhir ✨</h2>
        <div class="score-number" id="finalScoreSpan">0</div>
        <p id="gradeMessage"></p>
        <hr>
        <button class="close-modal" id="closeModalBtn">🔄 Ulangi Test</button>
    </div>
</div>

<script>
    const questions = [
        { image: "image/1.jpg", answer: "8" },
        { image: "image/2.jpg", answer: "7" },
        { image: "image/3.jpg", answer: "5" },
        { image: "image/4.jpg", answer: "3" },
        { image: "image/5.jpg", answer: "6" },
        { image: "image/6.jpg", answer: "10" },
        { image: "image/7.jpg", answer: "4" },
        { image: "image/8.jpg", answer: "10" },
        { image: "image/9.jpg", answer: "I" },
        { image: "image/10.jpg", answer: "N" },
        { image: "image/11.jpg", answer: "H" },
        { image: "image/12.jpg", answer: "A" },
        { image: "image/13.jpg", answer: "2" },
        { image: "image/14.jpg", answer: "L" },
        { image: "image/15.jpg", answer: "M" },
        { image: "image/16.jpg", answer: "E" },
        { image: "image/17.jpg", answer: "K" },
        { image: "image/18.jpg", answer: "F" },
        { image: "image/19.jpg", answer: "G" },
        { image: "image/20.jpg", answer: "3" },
        { image: "image/21.jpg", answer: "8" },
        { image: "image/22.jpg", answer: "3" },
        { image: "image/23.jpg", answer: "H" },
        { image: "image/24.jpg", answer: "E" },
        { image: "image/25.jpg", answer: "F" }

    ];

    let currentIndex = 0;
    let userAnswers = new Array(questions.length).fill("");
    const totalQuestions = questions.length;

    // DOM elements
    const questionImage = document.getElementById("questionImage");
    const answerInput = document.getElementById("answerInput");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const finishBtn = document.getElementById("finishBtn");
    const counterDisplay = document.getElementById("counterDisplay");
    const liveScoreDisplay = document.getElementById("liveScoreDisplay");
    const inputStatus = document.getElementById("inputStatus");
    const scoreModal = document.getElementById("scoreModal");
    const finalScoreSpan = document.getElementById("finalScoreSpan");
    const gradeMessage = document.getElementById("gradeMessage");
    const closeModalBtn = document.getElementById("closeModalBtn");

    function calculateCurrentScore() {
        let correct = 0;
        for (let i = 0; i < totalQuestions; i++) {
            const userAns = userAnswers[i] ? userAnswers[i].trim() : "";
            if (userAns === "") continue;
            const correctAns = questions[i].answer.toString().trim();
            if (userAns.toLowerCase() === correctAns.toLowerCase()) {
                correct++;
            }
        }
        return correct;
    }

    function updateLiveScore() {
        const score = calculateCurrentScore();
        liveScoreDisplay.innerHTML = `🏆 Skor: ${score} / ${totalQuestions}`;
    }

    function saveCurrentAnswer() {
        let raw = answerInput.value.trim();
        userAnswers[currentIndex] = raw;
        updateLiveScore();
        if (raw !== "") {
            inputStatus.innerHTML = "✓ Jawaban tersimpan";
            setTimeout(() => {
                if (inputStatus.innerHTML === "✓ Jawaban tersimpan") inputStatus.innerHTML = "";
            }, 900);
        } else {
            inputStatus.innerHTML = "";
        }
    }

    function loadQuestion() {
        saveCurrentAnswer();
        
        const q = questions[currentIndex];
        questionImage.src = q.image;
        answerInput.value = "";
        
        counterDisplay.innerText = `Soal ${currentIndex+1} / ${totalQuestions}`;
        
        if (currentIndex === totalQuestions - 1) {
            nextBtn.style.display = "none";
            finishBtn.style.display = "flex";
        } else {
            nextBtn.style.display = "flex";
            finishBtn.style.display = "none";
        }
        
        prevBtn.disabled = (currentIndex === 0);
        
        inputStatus.innerHTML = "";
        answerInput.focus();
    }
    
    function goPrev() {
        if (currentIndex > 0) {
            saveCurrentAnswer();
            currentIndex--;
            loadQuestion();
        }
    }
    
    function goNext() {
        if (currentIndex < totalQuestions - 1) {
            saveCurrentAnswer();
            currentIndex++;
            loadQuestion();
        } else {
            if (currentIndex === totalQuestions - 1) {
                finishQuiz();
            }
        }
    }
    
    function finishQuiz() {
        saveCurrentAnswer();
        
        const totalCorrect = calculateCurrentScore();
        const maxScore = totalQuestions;
        
        finalScoreSpan.innerText = `${totalCorrect} / ${maxScore}`;
        const percentage = (totalCorrect / maxScore) * 100;
        let message = "";
        if (percentage === 100) message = "🏆 Sempurna! Penglihatan dan ketelitian luar biasa! 🎉";
        else if (percentage >= 80) message = "🌟 Penglihatan hampir sempurna!";
        else if (percentage >= 60) message = "👍 Tingkatkan lagi ketelitianmu!";
        else if (percentage >= 40) message = "📚 Ayo coba lagi, perhatikan gambar dengan seksama!";
        else message = "💪 Jangan menyerah! Ulangi lagi untuk hasil lebih baik!";
        
        gradeMessage.innerText = message;
        scoreModal.classList.add("active");
    }
    
    function resetAndRestart() {
        userAnswers = new Array(questions.length).fill("");
        currentIndex = 0;
        updateLiveScore();
        loadQuestion();
        scoreModal.classList.remove("active");
        inputStatus.innerHTML = "";
        answerInput.focus();
    }
    
    function onFinishClick() {
        finishQuiz();
    }
    
    function onEnterPressed(e) {
        if (e.key === "Enter") {
            e.preventDefault();
            saveCurrentAnswer();
            if (currentIndex === totalQuestions - 1) {
                finishQuiz();
            } else {
                goNext();
            }
        }
    }
    
    function onBlurHandler() {
        saveCurrentAnswer();
    }
    
    function bindEvents() {
        prevBtn.addEventListener("click", goPrev);
        nextBtn.addEventListener("click", goNext);
        finishBtn.addEventListener("click", onFinishClick);
        closeModalBtn.addEventListener("click", resetAndRestart);
        answerInput.addEventListener("keydown", onEnterPressed);
        answerInput.addEventListener("blur", onBlurHandler);
        scoreModal.addEventListener("click", (e) => {
            if (e.target === scoreModal) {
            }
        });
    }
    
    function init() {
        bindEvents();
        loadQuestion();
        updateLiveScore();
        scoreModal.classList.remove("active");
    }
    
    init();
</script>
</body>
</html>
